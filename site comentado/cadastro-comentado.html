<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style-cadastro.css"> <!--link que conecta o css ao html-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> <!--link de download dos icones-->
</head>
<body>

    <a id="id_inicial" href="pagina inicial .html">←</a>  <!--o "<a>" serve para puxar links e o href especifica
                                                                         o link a ser puxado, nesse caso ele direciona para a pagina 
                                                                                                    inical que ainda nao esta ligada aqui-->

    <div class="wrapper">  <!--a div é necessaria para o html pos ela enqudrada tudo que esta dentro dela,
                                             nesse caso dentro dela esta todos os inputs, com logo, botao e etc -->

        <div class="img_box">
            <img src="imagens/maca4.png">
        </div>  <!--aqui temos um exemplo vizual melhor da div enquadrando a imagem dentro dela-->

            <div class="cls_container">

                <img id="id_logo" src="imagens/logoreal.png">

                    <h3>Crie sua conta</h3>

                        <div class="container_input">
                            <i class="fa-solid fa-coins"></i>  <!-- esse class funciona como codigo juntamente ao link de download dos icones que esta la em cima no "<head>,
                                                                    com ele e possivel colcar icones em a resolucao, diferente de imagens que perdem qualidade.
                                                                    os icones estao dentro das inputs e dos botoes.
                                                                                 recomendo dar uma olhada no site, link:https://fontawesome.com/"-->
                            <input type="text" id="ipt_codigo" class="cls_input" placeholder="Código de ativação">
                        </div>

                        <div class="container_input">
                            <i class="fa-regular fa-circle-user"></i>
                            <input type="text" id="ipt_usuario" class="cls_input" placeholder="Usuário">
                        </div>

                        <div class="container_input">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="ipt_email" class="cls_input" placeholder="Email">
                        </div>

                        <div class="container_input">
                            <i class="fa-solid fa-unlock"></i>
                            <input type="password" id="ipt_senha" class="cls_input" placeholder="Senha">
                        </div>

                        <div class="container_input">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="ipt_confirmar" class="cls_input" placeholder="Confirmar senha">
                        </div>

                    <div id="div_mensagem"></div>

            <button onclick="mostrar()" class="cls_button">Cadastrar<i class="fa-regular fa-circle-up"></i></button>

    <a id="id_cadastro" href="login .html">Já tem uma conta?</a>

</div>
</div>

<script>
function mostrar() {
let codigo = ipt_codigo.value;
let usuario = ipt_usuario.value;
let email = ipt_email.value;
let senha = ipt_senha.value;
let confirmar = ipt_confirmar.value;

    div_mensagem.innerHTML = "";

if (
    codigo.length == 0 ||
    usuario.length == 0 ||
    email.length == 0 ||
    senha.length == 0 ||
    confirmar.length == 0
) {
    div_mensagem.innerHTML = "Preencha todos os campos!";
    return;
}

if (usuario.length < 2) {
    div_mensagem.innerHTML += "Usuário inválido<br>";
    return;
}

let indice_arroba = email.indexOf("@");
let indice_ponto = email.indexOf(".");

if (indice_arroba < 1 || indice_ponto < indice_arroba) {
    div_mensagem.innerHTML += "Email inválido<br>";
    return;
}

let temMaiuscula = false;
let temEspecial = false;

let especiais = "!@#$%^&*()_+-=[]{};:'\",.<>?/\\|";

for (let i = 0; i < senha.length; i++) {
let letra = senha[i];

if (letra === letra.toUpperCase() && letra !== letra.toLowerCase()) {
    temMaiuscula = true;
}

if (especiais.includes(letra)) {
    temEspecial = true;
}
}

if (senha.length < 6 || !temMaiuscula || !temEspecial) {
    div_mensagem.innerHTML += "A senha precisa ter:<br>";
    div_mensagem.innerHTML += "- 6 caracteres<br>";
    div_mensagem.innerHTML += "- 1 letra maiúscula<br>";
    div_mensagem.innerHTML += "- 1 caractere especial<br>";
    return;
}

if (senha !== confirmar) {
    div_mensagem.innerHTML += "As senhas não coincidem<br>";
    return;
}

div_mensagem.innerHTML = "Cadastro realizado com sucesso!";
}
</script>
</body>
</html>
